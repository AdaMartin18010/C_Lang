name: Link Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run link check
        run: |
          python scripts/analyze_broken_links.py --check

      - name: Run content quality check
        run: |
          python scripts/analyze_content_quality.py --summary

      - name: Generate stats
        run: |
          python scripts/generate_stats.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: |
            link_check_report.json
            project_stats.json
