name: Content Sync

on:
  schedule:
    # 每周一 00:00 UTC 运行
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      scripts:
        description: '要运行的脚本（逗号分隔，留空运行全部）'
        required: false
        default: ''
      output_format:
        description: '输出格式'
        required: false
        default: 'markdown'
        type: choice
        options:
          - markdown
          - json

env:
  PYTHON_VERSION: '3.11'
  REPORTS_DIR: 'sync_reports'

jobs:
  sync:
    name: Content Synchronization
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    outputs:
      changes_detected: ${{ steps.check.outputs.changes }}
      report_files: ${{ steps.check.outputs.files }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml
        
    - name: Run content sync
      id: sync
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
      run: |
        echo "🚀 Starting content synchronization..."
        
        # 创建报告目录
        mkdir -p ${{ env.REPORTS_DIR }}
        
        cd scripts
        
        # 构建命令
        CMD="python content_sync.py --output-dir ../${{ env.REPORTS_DIR }}"
        
        # 添加脚本过滤
        if [ -n "${{ github.event.inputs.scripts }}" ]; then
          CMD="$CMD --scripts ${{ github.event.inputs.scripts }}"
        fi
        
        # 运行同步
        $CMD || EXIT_CODE=$?
        
        # 记录退出码
        echo "exit_code=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT
        
        echo "✅ Content sync completed"
        
    - name: Upload reports
      uses: actions/upload-artifact@v4
      with:
        name: sync-reports
        path: ${{ env.REPORTS_DIR }}/
        retention-days: 30
        
    - name: Check for changes
      id: check
      run: |
        echo "🔍 Checking for changes..."
        
        CHANGES=0
        REPORT_FILES=""
        
        # 查找所有生成的报告文件
        for file in ${{ env.REPORTS_DIR }}/*.md; do
          if [ -f "$file" ]; then
            REPORT_FILES="$REPORT_FILES$file,"
          fi
        done
        
        # 移除末尾的逗号
        REPORT_FILES="${REPORT_FILES%,}"
        
        # 检查JSON报告中的变更标记
        for json_file in ${{ env.REPORTS_DIR }}/*.json; do
          if [ -f "$json_file" ]; then
            if grep -q '"changes_detected": [1-9]' "$json_file" 2>/dev/null; then
              CHANGES=$((CHANGES + 1))
            fi
          fi
        done
        
        # 检查各脚本的报告
        for report in ${{ env.REPORTS_DIR }}/*_report_*.md; do
          if [ -f "$report" ]; then
            # 检查报告中是否包含变更标记
            if grep -q "检测到的变更\|changes detected\|变更数: [1-9]" "$report" 2>/dev/null; then
              CHANGES=$((CHANGES + 1))
            fi
          fi
        done
        
        echo "changes=$CHANGES" >> $GITHUB_OUTPUT
        echo "files=$REPORT_FILES" >> $GITHUB_OUTPUT
        
        if [ "$CHANGES" -gt 0 ]; then
          echo "📝 Found $CHANGES report(s) with changes"
        else
          echo "✅ No changes detected"
        fi

  create-issue:
    name: Create Tracking Issue
    needs: sync
    runs-on: ubuntu-latest
    if: needs.sync.outputs.changes_detected > 0
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download reports
      uses: actions/download-artifact@v4
      with:
        name: sync-reports
        path: ${{ env.REPORTS_DIR }}/
        
    - name: Create Issue
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          const reportsDir = '${{ env.REPORTS_DIR }}';
          
          // 查找所有报告文件
          const files = fs.readdirSync(reportsDir);
          
          // 获取综合报告
          const syncReports = files.filter(f => 
            f.startsWith('content_sync_report_') && f.endsWith('.md')
          ).sort().reverse();
          
          let issueBody = '## 📋 内容同步报告\n\n';
          issueBody += `**执行时间**: ${new Date().toISOString()}\n\n`;
          issueBody += '### 检测到变更的监控项\n\n';
          
          // 读取综合报告内容
          if (syncReports.length > 0) {
            const content = fs.readFileSync(path.join(reportsDir, syncReports[0]), 'utf8');
            // 截取重要部分
            const lines = content.split('\n');
            let inChanges = false;
            for (const line of lines) {
              if (line.includes('检测到的变更') || line.includes('Changes Detected')) {
                inChanges = true;
              }
              if (inChanges) {
                issueBody += line + '\n';
                if (line.startsWith('##') && !line.includes('变更')) {
                  break;
                }
              }
            }
          }
          
          // 添加报告链接
          issueBody += '\n### 详细报告\n\n';
          
          const allReports = files.filter(f => f.endsWith('.md')).sort();
          for (const report of allReports) {
            const name = report.replace(/_report_.*\.md$/, '').replace(/_/g, ' ');
            issueBody += `- [${name}](${reportsDir}/${report})\n`;
          }
          
          // 添加建议行动
          issueBody += '\n### 建议行动\n\n';
          issueBody += '- [ ] 审查各监控报告\n';
          issueBody += '- [ ] 更新知识库内容\n';
          issueBody += '- [ ] 根据需要创建PR\n';
          
          // 创建Issue
          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `📋 内容同步报告 - ${new Date().toISOString().split('T')[0]}`,
            body: issueBody,
            labels: ['automation', 'content-sync', 'monitoring']
          });
          
          console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
          
          // 设置输出
          core.setOutput('issue_number', issue.data.number);
          core.setOutput('issue_url', issue.data.html_url);

  create-pr:
    name: Create Update PR
    needs: [sync, create-issue]
    runs-on: ubuntu-latest
    if: needs.sync.outputs.changes_detected > 0 && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Download reports
      uses: actions/download-artifact@v4
      with:
        name: sync-reports
        path: ${{ env.REPORTS_DIR }}/
        
    - name: Prepare update branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 创建新分支
        BRANCH_NAME="content-sync-$(date +%Y%m%d-%H%M%S)"
        git checkout -b $BRANCH_NAME
        
        # 提交报告
        git add ${{ env.REPORTS_DIR }}/
        git commit -m "📋 Content sync reports - $(date +%Y-%m-%d)" || echo "No changes to commit"
        
        # 推送分支
        git push origin $BRANCH_NAME
        
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV
        
    - name: Create Pull Request
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          const reportsDir = '${{ env.REPORTS_DIR }}';
          const branchName = process.env.branch_name;
          
          // 构建PR描述
          let prBody = '## 📋 自动内容同步更新\n\n';
          prBody += '此PR包含内容同步脚本的最新监控报告。\n\n';
          prBody += '### 包含的报告\n\n';
          
          const files = fs.readdirSync(reportsDir);
          const mdFiles = files.filter(f => f.endsWith('.md')).sort();
          
          for (const file of mdFiles) {
            const name = file.replace(/_report_.*\.md$/, '').replace(/_/g, ' ');
            prBody += `- **${name}**: \`${file}\`\n`;
          }
          
          prBody += '\n### 审查清单\n\n';
          prBody += '- [ ] 报告内容已审查\n';
          prBody += '- [ ] 重要变更已记录\n';
          prBody += '- [ ] 知识库需要相应更新\n';
          
          if (${{ needs.create-issue.outputs.issue_number }}) {
            prBody += `\n关联Issue: #${{ needs.create-issue.outputs.issue_number }}\n`;
          }
          
          prBody += '\n---\n\n';
          prBody += '*由内容同步工作流自动生成*\n';
          
          // 创建PR
          const pr = await github.rest.pulls.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `📋 Content Sync Update - ${new Date().toISOString().split('T')[0]}`,
            head: branchName,
            base: 'main',
            body: prBody,
            draft: true  // 创建为草稿PR，需要人工审核
          });
          
          // 添加标签
          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr.data.number,
            labels: ['automation', 'content-sync', 'documentation']
          });
          
          console.log(`Created PR #${pr.data.number}: ${pr.data.html_url}`);

  notify:
    name: Send Notifications
    needs: [sync, create-issue]
    runs-on: ubuntu-latest
    if: always() && needs.sync.result == 'success'
    
    steps:
    - name: Check for critical alerts
      run: |
        # 检查是否有严重级别的安全公告
        CRITICAL_COUNT=0
        
        for file in ${{ env.REPORTS_DIR }}/*security*.md; do
          if [ -f "$file" ]; then
            if grep -q "🔴 CRITICAL\|critical\|严重" "$file" 2>/dev/null; then
              CRITICAL_COUNT=$((CRITICAL_COUNT + 1))
            fi
          fi
        done
        
        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          echo "⚠️ Found $CRITICAL_COUNT critical security advisories!"
          echo "critical_alerts=true" >> $GITHUB_ENV
        fi
        
    - name: Notify on critical alerts
      if: env.critical_alerts == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          // 在Issue中添加严重警告评论
          if (${{ needs.create-issue.outputs.issue_number }}) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.create-issue.outputs.issue_number }},
              body: '## 🚨 Critical Alert\n\n检测到严重级别的安全公告，请立即审查！'
            });
          }
          
          // 可以添加更多通知渠道（Slack, Email等）

  cleanup:
    name: Cleanup
    needs: [sync, create-issue, create-pr]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Clean up old reports
      run: |
        # 保留最近30天的报告
        find ${{ env.REPORTS_DIR }} -name "*.md" -mtime +30 -delete 2>/dev/null || true
        find ${{ env.REPORTS_DIR }} -name "*.json" -mtime +30 -delete 2>/dev/null || true
        
        echo "🧹 Cleanup completed"
