# 内存安全检查模板
# 复制到: .github/workflows/memory-safety.yml

name: Memory Safety

on: [push, pull_request]

jobs:
  address-sanitizer:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake clang
    
    - name: Configure with ASan
      run: |
        cmake -B build \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
          -DCMAKE_LINKER_FLAGS="-fsanitize=address"
    
    - name: Build
      run: cmake --build build
    
    - name: Test with ASan
      run: ctest --test-dir build --output-on-failure
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1

  valgrind:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Valgrind
      run: sudo apt-get update && sudo apt-get install -y valgrind cmake
    
    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
    
    - name: Build
      run: cmake --build build
    
    - name: Run Valgrind
      run: |
        valgrind --leak-check=full --show-leak-kinds=all --error-exitcode=1 \
          ./build/your_executable
