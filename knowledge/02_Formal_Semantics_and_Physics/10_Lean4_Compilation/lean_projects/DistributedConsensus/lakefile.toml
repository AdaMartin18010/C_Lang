name = "DistributedConsensus"
version = "0.1.0"
defaultTargets = ["DistributedConsensus"]

[[lean_lib]]
name = "Raft"

[[lean_exe]]
name = "raft-consensus"
root = "Main"

[dependencies]
std = { git = "https://github.com/leanprover/std4.git", rev = "v4.6.0" }
mathlib = { git = "https://github.com/leanprover-community/mathlib4.git", rev = "v4.6.0" }

[leanOptions]
pp.unicode.fun = true
pp.proofs.withType = false
autoImplicit = false
relaxedAutoImplicit = false
